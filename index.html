<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zikirmatik Altın & Yeşil</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* İslami Koyu Yeşil Gradyan */
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }
        
        /* Cam Tasarım Katmanı */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* Altın Yazı ve Parlama */
        .gold-text {
            color: #d4af37;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .gold-border {
            border-color: #d4af37;
        }

        /* Arka Plan Deseni */
        .islamic-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.15;
            pointer-events: none;
        }

        /* Parmak İzi Buton Efekti */
        .tap-btn {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.2), rgba(0, 0, 0, 0.2));
            transition: all 0.1s ease;
        }
        
        .tap-btn:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .active-tab {
            background: #d4af37 !important;
            color: #064e3b !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [mode, setMode] = useState('serbest');
            const [count, setCount] = useState(0);
            const [stepIndex, setStepIndex] = useState(0);
            const namazZikirleri = ["Sübhanallah", "Elhamdülillah", "Allahu Ekber"];

            const handleTouch = () => {
                if (navigator.vibrate) navigator.vibrate(40);
                
                if (mode === 'serbest') {
                    setCount(c => c + 1);
                } else {
                    if (count < 32) {
                        setCount(c => c + 1);
                    } else if (stepIndex < 2) {
                        setCount(0);
                        setStepIndex(s => s + 1);
                    } else {
                        setCount(33); // Son zikirde kal
                    }
                }
            };

            const reset = () => {
                setCount(0);
                setStepIndex(0);
            };

            return (
                <div className="relative h-screen w-full flex flex-col items-center justify-between py-12 px-6 overflow-hidden">
                    <div className="islamic-bg"></div>

                    {/* Header - Tab */}
                    <div className="glass-card flex w-full max-w-xs rounded-full p-1 z-10 border-gold/50">
                        <button 
                            onClick={() => {setMode('serbest'); reset();}}
                            className={`flex-1 py-2 rounded-full text-sm font-bold transition ${mode === 'serbest' ? 'active-tab' : 'text-gold-text'}`}
                        >
                            SERBEST
                        </button>
                        <button 
                            onClick={() => {setMode('namaz'); reset();}}
                            className={`flex-1 py-2 rounded-full text-sm font-bold transition ${mode === 'namaz' ? 'active-tab' : 'text-gold-text'}`}
                        >
                            NAMAZ
                        </button>
                    </div>

                    {/* Sayaç Alanı */}
                    <div className="relative flex flex-col items-center justify-center z-10">
                        {mode === 'namaz' && (
                            <div className="gold-text mb-4 text-xl italic font-serif opacity-90 animate-pulse">
                                {namazZikirleri[stepIndex]}
                            </div>
                        )}
                        
                        <div className="glass-card w-64 h-64 rounded-full flex flex-col items-center justify-center border-2 border-[#d4af37]/40 shadow-[0_0_50px_rgba(212,175,55,0.15)]">
                            <span className="gold-text text-8xl font-serif">
                                {count}
                            </span>
                            {mode === 'namaz' && (
                                <span className="text-white/40 text-xs mt-2 tracking-widest uppercase">
                                    Adım {stepIndex + 1} / 3
                                </span>
                            )}
                        </div>
                    </div>

                    {/* Dokun Butonu */}
                    <div className="flex flex-col items-center gap-8 z-10 w-full">
                        <button 
                            onClick={handleTouch}
                            className="tap-btn w-44 h-44 rounded-full border border-[#d4af37]/50 flex flex-col items-center justify-center shadow-2xl"
                        >
                            <i className="fa-solid fa-fingerprint text-6xl text-[#d4af37] mb-2 opacity-80"></i>
                            <span className="gold-text font-bold tracking-widest text-sm">DOKUN</span>
                        </button>

                        <button 
                            onClick={reset}
                            className="text-[#d4af37]/60 hover:text-[#d4af37] transition-all uppercase text-xs tracking-[0.2em] flex items-center gap-2"
                        >
                            <i className="fa-solid fa-trash-can"></i> SIFIRLA
                        </button>
                    </div>

                    <div className="absolute bottom-2 text-[#d4af37]/20 text-[10px] tracking-widest">
                        HAYIRLI ZİKİRLER
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
