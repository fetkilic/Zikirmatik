<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zikirmatik Pro</title>

    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#022c22">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --islamic-green: #022c22;
        }
        body {
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%);
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            margin: 0;
            overflow: hidden;
            font-family: 'serif';
            display: flex;
            justify-content: center;
        }
        .islamic-pattern {
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.1;
            pointer-events: none;
        }
        /* Glassmorphism card */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        /* Glow animation on click */
        .glow-active {
            animation: glow-pulse 0.4s ease-out;
        }
        @keyframes glow-pulse {
            0% { box-shadow: 0 0 0px var(--gold); }
            50% { box-shadow: 0 0 30px var(--gold); border-color: var(--gold); }
            100% { box-shadow: 0 0 0px var(--gold); }
        }
        .counter-text {
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            font-size: clamp(4rem, 15vh, 8rem); /* Responsive font size */
        }
        .tap-btn {
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }
        .tap-btn:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body>
    <div id="root" class="w-full max-w-md relative flex flex-col items-center"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [count, setCount] = useState(0);
            const [mode, setMode] = useState('serbest');
            const [stepIndex, setStepIndex] = useState(0);
            const [isGlowing, setIsGlowing] = useState(false);
            
            const namazZikirleri = ["Sübhanallah", "Elhamdülillah", "Allahu Ekber"];

            const handleTap = () => {
                if (navigator.vibrate) navigator.vibrate(40);
                
                // Trigger glow
                setIsGlowing(true);
                setTimeout(() => setIsGlowing(false), 400);

                if (mode === 'serbest') {
                    setCount(prev => prev + 1);
                } else {
                    if (count < 32) {
                        setCount(prev => prev + 1);
                    } else if (stepIndex < 2) {
                        setCount(0);
                        setStepIndex(prev => prev + 1);
                    } else {
                        alert("Tesbihat tamamlandı!");
                        setCount(0);
                        setStepIndex(0);
                    }
                }
            };

            return (
                <div className="h-full w-full flex flex-col justify-between items-center py-8 px-4 z-10">
                    <div className="islamic-pattern"></div>

                    {/* Tabs */}
                    <div className="glass flex w-full rounded-2xl p-1 mb-4">
                        <button 
                            onClick={() => {setMode('serbest'); setCount(0);}}
                            className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${mode === 'serbest' ? 'bg-[#d4af37] text-[#022c22]' : 'text-[#d4af37]'}`}
                        >
                            SERBEST
                        </button>
                        <button 
                            onClick={() => {setMode('namaz'); setCount(0); setStepIndex(0);}}
                            className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${mode === 'namaz' ? 'bg-[#d4af37] text-[#022c22]' : 'text-[#d4af37]'}`}
                        >
                            NAMAZ
                        </button>
                    </div>

                    {/* Counter Area */}
                    <div className={`glass w-64 h-64 sm:w-72 sm:h-72 rounded-full flex flex-col items-center justify-center border-2 transition-all duration-300 ${isGlowing ? 'border-[#d4af37] shadow-[0_0_40px_rgba(212,175,55,0.4)]' : 'border-[#d4af37]/30'}`}>
                        {mode === 'namaz' && (
                            <div className="text-[#d4af37] opacity-80 text-sm mb-2 tracking-widest uppercase">
                                {namazZikirleri[stepIndex]}
                            </div>
                        )}
                        <div className="counter-text font-serif leading-none">
                            {count}
                        </div>
                        {mode === 'namaz' && (
                            <div className="text-white/40 text-xs mt-2 uppercase">
                                Adım {stepIndex + 1} / 3
                            </div>
                        )}
                    </div>

                    {/* Main Button */}
                    <div className="flex flex-col items-center gap-6 w-full">
                        <button 
                            onClick={handleTap}
                            className={`tap-btn glass w-40 h-40 sm:w-48 sm:h-48 rounded-full flex flex-col items-center justify-center border-2 transition-all ${isGlowing ? 'border-[#d4af37]' : 'border-[#d4af37]/40'}`}
                        >
                            <i className={`fa-solid fa-fingerprint text-5xl sm:text-6xl mb-2 transition-all ${isGlowing ? 'text-[#d4af37] scale-110' : 'text-[#d4af37]/70'}`}></i>
                            <span className="text-[#d4af37] font-bold tracking-[3px] text-xs">DOKUN</span>
                        </button>

                        <button 
                            onClick={() => {setCount(0); setStepIndex(0);}}
                            className="text-[#d4af37]/40 hover:text-[#d4af37] flex items-center gap-2 text-xs tracking-widest transition-colors uppercase"
                        >
                            <i className="fa-solid fa-undo text-[10px]"></i> Sıfırla
                        </button>
                    </div>

                    <div className="text-[#d4af37]/20 text-[10px] tracking-[0.5em] uppercase mt-4">
                        Zikirmatik Pro v2
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
